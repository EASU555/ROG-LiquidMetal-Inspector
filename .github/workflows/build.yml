name: build-and-test

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run adversarial tests and package
        shell: powershell
        run: .\Source\Scripts\Build.ps1 -Package
      - name: Upload unsigned package and checksums
        uses: actions/upload-artifact@v4
        with:
          name: ROG-LiquidMetal-Inspector-v1.2.2-unsigned
          path: |
            Package\ROG-LiquidMetal-Inspector_v1.2.2_win-x64.zip
            Package\ROG-LiquidMetal-Inspector_v1.2.2_win-x64.zip.sha256
          if-no-files-found: error
